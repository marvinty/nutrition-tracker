{% extends "base.html" %}

{% block title %}Registrieren — Nutrition Tracker{% endblock %}

{% block content %}
<div class="page-card page-card--narrow">
    <div class="card-body card-body--auth">
        <h2 class="auth-title">Konto erstellen</h2>
        {% if error %}
        <p class="status error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/register" class="auth-form">
            <input type="text" name="username" placeholder="Benutzername" autocomplete="username" required>
            <input type="password" name="password" placeholder="Passwort" autocomplete="new-password" required>
            <button type="submit">Registrieren</button>
        </form>
        <p class="auth-footer">
            Bereits ein Konto? <a href="/login">Anmelden</a>
        </p>
    </div>
</div>
{% endblock %}
