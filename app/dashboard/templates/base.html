<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nutrition Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eeece4;
            --surface: #fbf8f2;
            --surface-2: #f2ede2;
            --surface-white: #ffffff;
            --text: #2b241f;
            --text-muted: #7a7164;
            --text-subtle: #a39a8d;
            --accent: #c96442;
            --accent-hover: #b4553a;
            --accent-text: #8a5c47;
            --accent-soft: #f2e2d6;
            --accent-soft-2: #faece4;
            --accent-cal: #b4553a;
            --border: #e4dcc9;
            --border-strong: #d9cdb5;
            --danger: #b3412c;
            --r-sm: 12px;
            --r-md: 16px;
            --r-lg: 24px;
            --r-pill: 20px;
            --shadow: 0 1px 3px rgba(60,45,30,.05), 0 12px 32px rgba(60,45,30,.06);
            --serif: "Fraunces", Georgia, "Times New Roman", serif;
            --sans: "Inter", system-ui, -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--sans);
            margin: 0;
            padding: 48px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            color: var(--text);
            background: var(--bg);
            line-height: 1.55;
        }
        h2 { font-family: var(--serif); font-weight: 500; color: var(--text); margin-top: 0; letter-spacing: -0.01em; }
        h3 { font-family: var(--serif); font-weight: 500; color: var(--text); margin-bottom: 12px; font-size: 1rem; }
        a { color: var(--accent-cal); }
        button, a.pill, .pill, .nav-btn, .tab, .log-form button, .log-form input, input[type="date"] {
            transition: background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        .page-card {
            width: 640px;
            max-width: 100%;
            background: var(--surface);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .page-card--narrow { width: 380px; }
        .card-top { padding: 36px 40px 0; }
        .card-body { padding: 20px 40px 40px; }
        .card-body--auth { padding: 48px 40px; }

        /* Shared components */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .topbar .who { color: var(--text-subtle); font-size: 0.85rem; }
        .topbar .who strong { color: var(--text-muted); }
        .topbar .actions { display: flex; gap: 10px; align-items: center; }
        .topbar form { margin: 0; }

        .pill {
            display: inline-block;
            padding: 6px 14px;
            border: none;
            border-radius: var(--r-pill);
            background: none;
            color: var(--text-subtle);
            font: inherit;
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
        }
        .pill--soft { background: var(--accent-soft); color: var(--accent-text); }
        .pill--soft:hover { background: var(--border); }
        .pill:hover { color: var(--text); }

        .day-nav { display: flex; gap: 10px; align-items: center; margin: 20px 0 6px; flex-wrap: wrap; }
        .nav-btn {
            padding: 6px 12px;
            border: none;
            border-radius: var(--r-pill);
            background: var(--accent-soft);
            color: var(--accent-text);
            font-size: 0.85rem;
            text-decoration: none;
            cursor: pointer;
        }
        .nav-btn:hover { background: var(--border); }
        .nav-btn.is-disabled {
            background: var(--surface-2);
            color: var(--text-subtle);
            cursor: default;
        }
        input[type="date"] {
            padding: 6px 11px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--surface-white);
            color: var(--text);
            font: inherit;
            font-size: 0.85rem;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab {
            padding: 7px 18px;
            border: none;
            border-radius: var(--r-pill);
            background: none;
            color: var(--text-subtle);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
        }
        .tab:hover { color: var(--text); }
        .tab.is-active {
            background: var(--accent);
            color: #fff;
        }

        h2.page-title { font-size: 1.75rem; margin: 4px 0 28px; }

        .log-panel {
            background: var(--surface-2);
            border-radius: var(--r-md);
            padding: 20px 24px;
            margin-bottom: 28px;
        }
        .log-form {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 0 0 10px;
        }
        .log-form:last-child { margin-bottom: 0; }
        .log-form input[type="text"],
        .log-form input[type="password"] {
            flex: 1;
            padding: 11px 16px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--surface-white);
            color: var(--text);
        }
        .log-form input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .log-form button {
            padding: 0 22px;
            height: 42px;
            border: none;
            border-radius: var(--r-sm);
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }
        .log-form button:hover:not(:disabled) { background: var(--accent-hover); }
        .log-form button:disabled { background: var(--accent-soft); color: #fff; cursor: not-allowed; }
        .log-form button.secondary {
            height: auto;
            padding: 9px 16px;
            background: var(--surface-white);
            border: 1px solid var(--border);
            color: var(--accent-text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .log-form button.secondary::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }
        .log-form button.secondary:hover:not(:disabled) { background: var(--surface-2); }

        .status { min-height: 1.2em; font-size: 0.85rem; color: var(--text-muted); margin: 4px 0 0; }
        .status.error { color: var(--danger); }
        .hidden { display: none; }
        #record-indicator { color: var(--danger); font-size: 0.85rem; font-weight: 500; }
        .clarify {
            margin-top: 12px;
            padding: 14px 16px;
            border-left: 3px solid var(--accent);
            border-radius: var(--r-sm);
            background: var(--surface-white);
        }
        .clarify-question { margin: 0 0 10px; color: var(--text); font-weight: 500; font-size: 0.95rem; }
        .clarify .log-form { margin: 0; }

        .totals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        .totals-card {
            background: var(--surface-2);
            border-radius: var(--r-md);
            padding: 18px 8px;
            text-align: center;
        }
        .totals-card--cal { background: var(--accent-soft-2); }
        .totals-card .value { font-family: var(--serif); font-size: 26px; font-weight: 500; color: var(--text); }
        .totals-card--cal .value { color: var(--accent-cal); }
        .totals-card .label { font-family: var(--sans); font-size: 11px; color: var(--text-subtle); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
        .totals-card--cal .label { color: #a3705d; }
        .totals-grid--compact .totals-card { padding: 16px 8px; }
        .totals-grid--compact .totals-card .value { font-size: 22px; }

        /* Macro goal progress (dashboard totals cards) */
        .goal-meta { font-size: 10px; color: var(--text-subtle); margin-top: 6px; letter-spacing: 0.02em; }
        .totals-card--cal .goal-meta { color: #a3705d; }
        .goal-bar {
            height: 5px;
            border-radius: 3px;
            background: var(--border);
            margin-top: 5px;
            overflow: hidden;
        }
        .goal-bar__fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent);
            transition: width .2s ease;
        }
        .goal-bar__fill--over { background: var(--danger); }

        /* Goal adherence (history) */
        .adherence {
            background: var(--accent-soft-2);
            border-radius: var(--r-md);
            padding: 12px 16px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            color: var(--accent-text);
        }
        .adherence strong { color: var(--accent-cal); }
        .adherence-target { color: var(--text-subtle); font-size: 0.82rem; }
        .goal-tick { color: var(--accent); font-weight: 700; flex-shrink: 0; }

        /* Goals form (Ziele page) */
        .goals-form { margin-top: 4px; }
        .goals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .goals-field { display: flex; flex-direction: column; gap: 4px; }
        .goals-field label { font-size: 11px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.04em; }
        .goals-field input {
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font: inherit;
            font-size: 0.95rem;
            background: var(--surface-white);
            color: var(--text);
        }
        .goals-field input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .goals-actions { display: flex; align-items: center; gap: 12px; margin-top: 16px; }
        .goals-actions button {
            padding: 0 22px;
            height: 42px;
            border: none;
            border-radius: var(--r-sm);
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }
        .goals-actions button:hover:not(:disabled) { background: var(--accent-hover); }
        .goals-actions button:disabled { background: var(--accent-soft); color: #fff; cursor: not-allowed; }
        .goals-actions .status { margin: 0; }

        .empty { color: var(--text-subtle); font-style: italic; font-size: 0.9rem; }

        .row-list { display: flex; flex-direction: column; gap: 8px; }
        .row-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface-white);
            border-radius: 14px;
            padding: 12px 16px;
        }
        .row-item--link { cursor: pointer; }
        .row-item--total {
            background: var(--accent-soft-2);
            padding: 14px 16px;
            margin-top: 4px;
        }
        .row-time { font-size: 12px; color: var(--text-subtle); width: 42px; flex-shrink: 0; }
        .row-main { flex: 1; min-width: 0; }
        .row-title { font-size: 14px; color: var(--text); }
        .row-sub { font-size: 12px; color: var(--text-subtle); margin-top: 2px; }
        .row-day { font-size: 13px; font-weight: 500; color: var(--text); width: 100px; flex-shrink: 0; }
        .row-macros { font-size: 13px; color: var(--text-muted); flex: 1; }
        .row-count { font-size: 12px; color: var(--text-subtle); }
        .row-cal { font-size: 13px; font-weight: 500; color: var(--accent-cal); white-space: nowrap; }
        .row-item--total .row-day,
        .row-item--total .row-macros,
        .row-item--total .row-count { font-weight: 600; color: var(--accent-text); }

        .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .row-btn {
            border: none;
            background: none;
            color: var(--text-subtle);
            font: inherit;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: var(--r-sm);
            cursor: pointer;
        }
        .row-btn:hover { background: var(--surface-2); color: var(--text); }

        .row-edit {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--surface-white);
            border-radius: 14px;
            padding: 14px 16px;
        }
        .row-edit.hidden { display: none; }
        .row-edit__desc {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font: inherit;
            font-size: 14px;
            background: var(--surface-white);
            color: var(--text);
        }
        .row-edit__macros { display: flex; gap: 8px; flex-wrap: wrap; }
        .row-edit__field { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 64px; }
        .row-edit__field label { font-size: 11px; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.04em; }
        .row-edit__field input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font: inherit;
            font-size: 13px;
            background: var(--surface-white);
            color: var(--text);
        }
        .row-edit__desc:focus-visible,
        .row-edit__field input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .row-edit__actions { display: flex; gap: 8px; align-items: center; }
        .row-edit__actions button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--r-sm);
            font: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .row-edit__save { background: var(--accent); color: #fff; }
        .row-edit__save:hover:not(:disabled) { background: var(--accent-hover); }
        .row-edit__save:disabled { background: var(--accent-soft); color: #fff; cursor: not-allowed; }
        .row-edit__cancel { background: var(--surface-2); color: var(--text-muted); }
        .row-edit__cancel:hover { background: var(--border); }
        .row-edit__delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border: none;
            background: none;
            color: var(--text-subtle);
            border-radius: var(--r-sm);
            cursor: pointer;
        }
        .row-edit__delete:hover { background: var(--accent-soft-2); color: var(--danger); }
        .row-edit .status { flex: 1; margin: 0; }

        .auth-title { font-size: 26px; margin: 0 0 28px; }
        .auth-form { display: flex; flex-direction: column; gap: 14px; }
        .auth-form input {
            font-family: inherit;
            font-size: 0.95rem;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--surface-white);
            color: var(--text);
        }
        .auth-form input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .auth-form button {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border: none;
            padding: 13px;
            border-radius: var(--r-sm);
            cursor: pointer;
            margin-top: 6px;
        }
        .auth-form button:hover { background: var(--accent-hover); }
        .auth-footer { font-size: 0.85rem; color: var(--text-subtle); margin-top: 22px; }
        .auth-footer a { color: var(--accent-cal); }

        @media (max-width: 600px) {
            body { padding: 20px 12px; gap: 20px; }
            .card-top { padding: 24px 18px 0; }
            .card-body { padding: 16px 18px 28px; }
            .card-body--auth { padding: 32px 22px; }
            .page-card--narrow { width: 100%; }
            .topbar .actions { flex-wrap: wrap; }
            h2.page-title { font-size: 1.4rem; margin: 4px 0 20px; }
            .totals-grid { grid-template-columns: repeat(2, 1fr); }
            /* Allow 2-col goals inputs to shrink within their grid cells */
            .goals-field { min-width: 0; }
            .goals-field input { width: 100%; }
            /* Let flex text inputs shrink so their submit button stays visible */
            .log-form input[type="text"],
            .log-form input[type="password"] { min-width: 0; }

            /* History rows: day + count on line 1, full macros on line 2 */
            .row-item { flex-wrap: wrap; column-gap: 10px; row-gap: 2px; }
            .row-day { width: auto; }
            .row-macros { flex-basis: 100%; order: 3; }
            .goal-tick { order: 2; }
            .row-count { order: 2; }
        }

        @media (max-width: 400px) {
            .totals-card .value { font-size: 22px; }
            .totals-grid--compact .totals-card .value { font-size: 20px; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
