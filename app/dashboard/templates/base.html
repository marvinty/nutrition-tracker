<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nutrition Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f5;
            --surface: #ffffff;
            --surface-2: #f5f4ee;
            --text: #24231f;
            --text-muted: #6b6a63;
            --text-subtle: #96948c;
            --accent: #c96442;
            --accent-hover: #b4553a;
            --accent-soft: #f4e3da;
            --border: #e7e3d8;
            --border-strong: #d9d4c6;
            --danger: #b3412c;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --shadow: 0 1px 2px rgba(40,35,25,.04), 0 4px 12px rgba(40,35,25,.05);
            --serif: "Fraunces", Georgia, "Times New Roman", serif;
            --sans: system-ui, -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--sans);
            max-width: 860px;
            margin: 40px auto;
            padding: 0 20px;
            color: var(--text);
            background: var(--bg);
            line-height: 1.55;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 28px;
        }
        header h1 { margin: 0; font-family: var(--serif); font-weight: 600; font-size: 1.6rem; color: var(--text); letter-spacing: -0.01em; }
        h2 { font-family: var(--serif); font-weight: 600; color: var(--text); margin-top: 0; letter-spacing: -0.01em; }
        h3 { font-family: var(--serif); font-weight: 500; color: var(--text); margin-bottom: 8px; }
        a { color: var(--accent); }
        button, a.btn, .btn, .nav-btn, .tab, .log-form button, .log-form input, input[type="date"] {
            transition: background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* Shared components */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .topbar .who { color: var(--text-muted); }
        .topbar .actions { display: flex; gap: 8px; align-items: center; }
        .topbar form { margin: 0; }

        .btn {
            display: inline-block;
            padding: 7px 15px;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            background: var(--surface);
            color: var(--text-muted);
            font: inherit;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
        }
        .btn:hover { background: var(--surface-2); color: var(--text); }
        .btn--accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn--accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }

        .day-nav { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
        .nav-btn {
            padding: 6px 13px;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            background: var(--surface);
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
        }
        .nav-btn:hover { background: var(--surface-2); color: var(--text); }
        .nav-btn.is-disabled {
            border-color: var(--border);
            background: var(--surface-2);
            color: var(--text-subtle);
            cursor: default;
        }
        input[type="date"] {
            padding: 6px 11px;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            background: var(--surface);
            color: var(--text);
            font: inherit;
            font-size: 0.95rem;
        }

        .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
        .tab {
            padding: 6px 16px;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            background: var(--surface);
            color: var(--text-muted);
            text-decoration: none;
        }
        .tab:hover { background: var(--surface-2); color: var(--text); }
        .tab.is-active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        th, td {
            text-align: left;
            padding: 11px 15px;
            border-bottom: 1px solid var(--border);
        }
        th { background: var(--surface-2); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--accent-soft); }
        .row-link { cursor: pointer; }
        tfoot .total-row td { font-weight: 700; background: var(--surface-2); }

        .totals-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin: 16px 0 32px;
        }
        .totals-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-top: 3px solid var(--border-strong);
            border-radius: var(--r-md);
            padding: 18px 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .totals-card--cal { border-top-color: var(--accent); }
        .totals-card--protein { border-top-color: #7c9a6b; }
        .totals-card--carbs { border-top-color: #d0a24c; }
        .totals-card--fat { border-top-color: #b08bbf; }
        .totals-card .value { font-family: var(--serif); font-size: 1.9rem; font-weight: 600; color: var(--text); }
        .totals-card--cal .value { color: var(--accent); }
        .totals-card .label { font-size: 0.78rem; color: var(--text-subtle); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

        .empty { color: var(--text-subtle); font-style: italic; }
        .log-form {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 12px 0;
        }
        .log-form input[type="text"],
        .log-form input[type="password"] {
            flex: 1;
            padding: 11px 15px;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            font-size: 1rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
        }
        .log-form input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .log-form button {
            padding: 11px 20px;
            border: 1px solid var(--accent);
            border-radius: var(--r-sm);
            background: var(--accent);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }
        .log-form button:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
        .log-form button:disabled { background: var(--accent-soft); border-color: var(--accent-soft); color: #fff; cursor: not-allowed; }
        .log-form button.secondary {
            background: var(--surface);
            border-color: var(--border-strong);
            color: var(--text-muted);
        }
        .log-form button.secondary:hover:not(:disabled) { background: var(--surface-2); color: var(--text); }

        .status { min-height: 1.2em; font-size: 0.9rem; color: var(--text-muted); }
        .status.error { color: var(--danger); }
        .hidden { display: none; }
        #record-indicator { color: var(--danger); font-size: 0.9rem; font-weight: 500; }
        .clarify {
            margin-top: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-strong);
            border-left: 3px solid var(--accent);
            border-radius: var(--r-md);
            background: var(--surface-2);
        }
        .clarify-question { margin: 0 0 10px; color: var(--text); font-weight: 500; }
        .clarify .log-form { margin: 0; }
        @media (max-width: 600px) {
            .totals-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Nutrition Tracker</h1>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
