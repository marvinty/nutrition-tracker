{% extends "base.html" %}

{% block title %}Makro-Ziele{% endblock %}

{% block extra_head %}
<style>
    .goals-card{max-width:640px}
    .goals-card .hint{margin-bottom:24px}
    .goals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .goals-actions{display:flex;align-items:center;gap:16px;margin-top:24px;flex-wrap:wrap}
    .goals-actions .status{margin:0}
    @media(max-width:560px){.goals-grid{grid-template-columns:1fr}}
</style>
{% endblock %}

{% block content %}
<div class="page-head">
    <div>
        <span class="sec-tag">Deine Vorgaben</span>
        <h1 class="page-h">Makro-<em>Ziele</em></h1>
    </div>
</div>

<div class="card feat goals-card">
    <p class="hint">Tagesziele. Leer lassen = kein Ziel für dieses Makro. Der Fortschritt erscheint als Balken auf dem Dashboard.</p>
    <form id="goals-form" class="goals-form">
        <div class="goals-grid">
            <div class="field">
                <label for="goal-calories">kcal</label>
                <input type="number" step="any" min="0" id="goal-calories" placeholder="kein Ziel"
                       value="{{ goal.calories if goal and goal.calories is not none else '' }}">
            </div>
            <div class="field">
                <label for="goal-protein">Protein (g)</label>
                <input type="number" step="any" min="0" id="goal-protein" placeholder="kein Ziel"
                       value="{{ goal.protein if goal and goal.protein is not none else '' }}">
            </div>
            <div class="field">
                <label for="goal-carbs">Carbs (g)</label>
                <input type="number" step="any" min="0" id="goal-carbs" placeholder="kein Ziel"
                       value="{{ goal.carbs if goal and goal.carbs is not none else '' }}">
            </div>
            <div class="field">
                <label for="goal-fat">Fett (g)</label>
                <input type="number" step="any" min="0" id="goal-fat" placeholder="kein Ziel"
                       value="{{ goal.fat if goal and goal.fat is not none else '' }}">
            </div>
        </div>
        <div class="goals-actions">
            <button type="submit" id="goals-btn" class="btn">Speichern</button>
            <span id="goals-status" class="status"></span>
        </div>
    </form>
</div>

<script>
    const form = document.getElementById('goals-form');
    const btn = document.getElementById('goals-btn');
    const status = document.getElementById('goals-status');

    function num(id) {
        const v = document.getElementById(id).value.trim();
        return v === '' ? null : parseFloat(v);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            calories: num('goal-calories'),
            protein: num('goal-protein'),
            carbs: num('goal-carbs'),
            fat: num('goal-fat'),
        };
        btn.disabled = true;
        status.textContent = 'Wird gespeichert…';
        status.className = 'status';
        try {
            const res = await fetch('/api/goals', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.detail || `Request failed (${res.status})`);
            }
            status.textContent = 'Gespeichert ✓';
        } catch (err) {
            status.textContent = err.message;
            status.className = 'status error';
        } finally {
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
