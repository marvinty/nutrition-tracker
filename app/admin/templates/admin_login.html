{% extends "admin_base.html" %}

{% block title %}Admin-Anmeldung — Nutrition Tracker{% endblock %}

{% block content %}
<div class="page-card page-card--narrow">
    <div class="card-body card-body--auth">
        <h2 class="auth-title">Admin-Bereich</h2>
        <p class="auth-sub">Anmeldung nur für Administratoren.</p>
        {% if error %}
        <p class="status error">{{ error }}</p>
        {% endif %}
        <form method="post" action="/admin/login" class="auth-form">
            <input type="text" name="username" placeholder="Benutzername" autocomplete="username" required>
            <input type="password" name="password" placeholder="Passwort" autocomplete="current-password" required>
            <button type="submit">Anmelden</button>
        </form>
    </div>
</div>
{% endblock %}
