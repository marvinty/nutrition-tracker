<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — Nutrition Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Same design system as the user-facing app (DESIGN.md). The admin side is
           marked by a dark nav bar — a dark panel on --text, which the system allows —
           rather than by a separate palette. */
        :root{
            --bg:#eeece4;
            --surface:#fbf8f2;
            --surface-2:#f2ede2;
            --text:#2b241f;
            --text-muted:#7a7164;
            --text-subtle:#a39a8d;
            --accent:#c96442;
            --accent-hover:#b4553a;
            --accent-soft:#f2e2d6;
            --border:#e4dcc9;
            --danger:#a33520;
            --danger-soft:#f4ded6;
            --serif:'Newsreader',Georgia,serif;
            --sans:'Inter',system-ui,-apple-system,sans-serif;
            --r-btn:11px;
            --r-card:20px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{-webkit-text-size-adjust:100%}
        body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;
            line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        a{color:var(--accent);text-decoration:none}
        a:hover{color:var(--accent-hover)}
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        .wrap{width:100%;max-width:1100px;margin:0 auto;padding:0 32px}
        .hidden{display:none!important}

        /* dark admin bar */
        .admin-bar{background:var(--text);color:#f4efe6}
        .admin-in{display:flex;align-items:center;justify-content:space-between;gap:18px;
            min-height:64px;flex-wrap:wrap;padding:10px 0}
        .admin-bar .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);
            font-size:19px;color:#fbf8f2}
        .admin-bar .brand .tag{font-family:var(--sans);font-size:10px;font-weight:600;
            text-transform:uppercase;letter-spacing:.1em;background:var(--accent);color:#fff;
            border-radius:99px;padding:3px 10px}
        .admin-bar .actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .admin-bar .who{color:#8a7f6f;font-size:13px;margin-right:6px}
        .admin-bar form{margin:0}
        .admin-bar .pill{padding:7px 15px;border:none;border-radius:99px;background:rgba(255,255,255,.09);
            color:#d8cdbd;font:inherit;font-size:14px;font-weight:500;cursor:pointer;
            transition:background .2s,color .2s}
        .admin-bar .pill:hover{background:rgba(255,255,255,.17);color:#fff}
        .admin-bar .pill.is-active{background:var(--accent);color:#fff}

        main{padding:40px 0 72px}
        .sec-tag{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
        h1.page-h{font-family:var(--serif);font-weight:500;letter-spacing:-.03em;line-height:1.05;
            font-size:clamp(34px,5vw,52px);margin:8px 0 28px}
        h1.page-h em{font-style:italic;color:var(--accent)}
        h3{font-family:var(--serif);font-weight:500;font-size:22px;letter-spacing:-.01em;margin:40px 0 16px}

        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:28px}
        .card.feat{background:var(--surface-2)}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:44px;
            padding:0 22px;border-radius:var(--r-btn);background:var(--accent);color:#fff;
            font-family:inherit;font-weight:500;font-size:15px;border:none;cursor:pointer;
            white-space:nowrap;transition:background .2s,transform .2s}
        .btn:hover:not(:disabled){background:var(--accent-hover);color:#fff;transform:translateY(-1px)}
        .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
        .btn.ghost:hover:not(:disabled){background:var(--surface);color:var(--text);border-color:var(--text-subtle)}

        input[type=text],input[type=password],input[type=number]{font-family:inherit;font-size:15px;
            padding:0 14px;height:44px;border:1px solid var(--border);border-radius:var(--r-btn);
            background:var(--surface);color:var(--text);width:100%}
        input::placeholder{color:var(--text-subtle)}
        input:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
        label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle)}
        .status{min-height:1.3em;font-size:14px;color:var(--text-muted);margin-top:12px}
        .status.error{color:var(--danger);font-weight:500}
        .empty{color:var(--text-subtle);font-style:italic}
        .muted{color:var(--text-subtle)}

        /* data table */
        .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r-card);
            background:var(--surface)}
        table.data{width:100%;border-collapse:collapse;font-size:15px}
        table.data th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;
            letter-spacing:.07em;color:var(--text-subtle);padding:16px 16px 12px;white-space:nowrap}
        table.data td{padding:14px 16px;border-top:1px solid var(--border);color:var(--text-muted);
            white-space:nowrap}
        table.data td.name{color:var(--text);font-weight:500}
        table.data td.num,table.data th.num{text-align:right}
        table.data td.num{font-family:var(--serif);font-variant-numeric:tabular-nums;font-size:16px}
        table.data tr:hover td{background:var(--surface-2)}
        table.data td form{margin:0}
        .count-note{font-size:14px;color:var(--text-subtle);margin-top:16px}

        .tier{display:inline-block;padding:3px 11px;border-radius:99px;font-size:11px;font-weight:600;
            text-transform:uppercase;letter-spacing:.05em;background:var(--surface-2);color:var(--text-muted)}
        .tier--pro,.tier--active{background:var(--accent-soft);color:var(--accent)}
        .tier--used_up,.tier--expired,.tier--revoked{background:var(--surface-2);color:var(--text-subtle)}

        code,.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;letter-spacing:.04em}
        .code{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
            padding:4px 10px;color:var(--text)}

        /* settings panel */
        .panel-row{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
        .panel-note{font-size:14px;color:var(--text-subtle);margin-top:6px;max-width:52ch}
        .panel-note--warn{color:var(--danger);margin-top:16px;max-width:none}

        .invite-form{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
        .invite-field{display:flex;flex-direction:column;gap:6px}
        .invite-field--wide{flex:1;min-width:200px}

        .row-btn{border:none;background:none;color:var(--text-subtle);font:inherit;font-size:13px;
            padding:5px 10px;border-radius:8px;cursor:pointer}
        .row-btn:hover{background:var(--accent-soft);color:var(--accent)}

        /* admin login */
        .auth-wrap{min-height:calc(100vh - 64px);display:grid;place-items:center;padding:40px 0}
        .auth-card{width:100%;max-width:420px}
        .auth-title{font-family:var(--serif);font-weight:500;font-size:34px;letter-spacing:-.03em;
            line-height:1.1;margin-bottom:6px}
        .auth-sub{font-size:15px;color:var(--text-subtle);margin-bottom:26px}
        .auth-form{display:flex;flex-direction:column;gap:14px}
        .auth-form .btn{margin-top:6px;width:100%}

        @media(max-width:640px){
            .wrap{padding:0 18px}
            main{padding:28px 0 56px}
            .card{padding:20px}
            .panel-row{align-items:stretch}
            .invite-form{align-items:stretch}
            .invite-form .btn{width:100%}
            .admin-bar .who{display:none}
        }
        @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
