<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — Nutrition Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
        /* Same palette as the user-facing app, but a cool-grey surface and a dark
           header bar so it is never ambiguous which side of the app you are on. */
        :root {
            --bg: #e8e8ea;
            --surface: #fbfbfc;
            --surface-2: #f1f1f4;
            --surface-white: #ffffff;
            --text: #232326;
            --text-muted: #6c6c76;
            --text-subtle: #9a9aa4;
            --accent: #c96442;
            --accent-hover: #b4553a;
            --accent-text: #8a5c47;
            --accent-soft: #f2e2d6;
            --header: #2b2b30;
            --border: #dededf;
            --danger: #b3412c;
            --r-sm: 12px;
            --r-md: 16px;
            --r-lg: 24px;
            --r-pill: 20px;
            --shadow: 0 1px 3px rgba(30,30,40,.05), 0 12px 32px rgba(30,30,40,.07);
            --serif: "Fraunces", Georgia, "Times New Roman", serif;
            --sans: "Inter", system-ui, -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--sans);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            color: var(--text);
            background: var(--bg);
            line-height: 1.55;
        }
        h2 { font-family: var(--serif); font-weight: 500; margin-top: 0; letter-spacing: -0.01em; }
        a { color: var(--accent-text); }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        .page-card {
            width: 860px;
            max-width: 100%;
            background: var(--surface);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .page-card--narrow { width: 380px; }
        .card-body { padding: 28px 36px 36px; }
        .card-body--auth { padding: 48px 40px; }

        /* Admin header bar — the visual "you are in the admin panel" marker */
        .admin-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 16px 36px;
            background: var(--header);
            color: #fff;
        }
        .admin-bar .brand {
            font-family: var(--serif);
            font-size: 1.05rem;
            letter-spacing: -0.01em;
        }
        .admin-bar .brand .tag {
            font-family: var(--sans);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            background: var(--accent);
            border-radius: var(--r-pill);
            padding: 2px 9px;
            margin-left: 9px;
            vertical-align: middle;
        }
        .admin-bar .actions { display: flex; gap: 8px; align-items: center; }
        .admin-bar .who { color: rgba(255,255,255,.6); font-size: 0.82rem; }
        .admin-bar form { margin: 0; }
        .admin-bar .pill {
            padding: 6px 14px;
            border: none;
            border-radius: var(--r-pill);
            background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.85);
            font: inherit;
            font-size: 0.82rem;
            text-decoration: none;
            cursor: pointer;
        }
        .admin-bar .pill:hover { background: rgba(255,255,255,.18); color: #fff; }
        .admin-bar .pill.is-active { background: var(--accent); color: #fff; }

        h2.page-title { font-size: 1.5rem; margin: 4px 0 22px; }
        .status { min-height: 1.2em; font-size: 0.85rem; color: var(--text-muted); margin: 4px 0 0; }
        .status.error { color: var(--danger); }
        .empty { color: var(--text-subtle); font-style: italic; font-size: 0.9rem; }

        /* Data table */
        .table-wrap { overflow-x: auto; }
        table.data { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        table.data th {
            text-align: left;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-subtle);
            padding: 0 12px 10px;
            white-space: nowrap;
        }
        table.data td {
            padding: 12px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            white-space: nowrap;
        }
        table.data td.name { color: var(--text); font-weight: 500; }
        table.data td.num { text-align: right; font-variant-numeric: tabular-nums; }
        table.data th.num { text-align: right; }
        table.data tr:hover td { background: var(--surface-2); }
        .muted { color: var(--text-subtle); }
        .tier {
            display: inline-block;
            padding: 2px 10px;
            border-radius: var(--r-pill);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--surface-2);
            color: var(--text-muted);
        }
        .tier--pro { background: var(--accent-soft); color: var(--accent-text); }
        .count-note { font-size: 0.82rem; color: var(--text-subtle); margin: 16px 0 0; }

        .auth-title { font-size: 24px; margin: 0 0 6px; }
        .auth-sub { font-size: 0.85rem; color: var(--text-subtle); margin: 0 0 24px; }
        .auth-form { display: flex; flex-direction: column; gap: 14px; }
        .auth-form input {
            font-family: inherit;
            font-size: 0.95rem;
            padding: 13px 16px;
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            background: var(--surface-white);
            color: var(--text);
        }
        .auth-form input:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
        .auth-form button {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border: none;
            padding: 13px;
            border-radius: var(--r-sm);
            cursor: pointer;
            margin-top: 6px;
        }
        .auth-form button:hover { background: var(--accent-hover); }

        @media (max-width: 600px) {
            body { padding: 16px 10px; gap: 18px; }
            .admin-bar { padding: 14px 18px; }
            .card-body { padding: 20px 18px 28px; }
            .card-body--auth { padding: 32px 22px; }
            .page-card--narrow { width: 100%; }
            h2.page-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
